document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r\" stroke-width=\"5.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n            <span style=\"font-family:Newsreader,Georgia,serif;font-weight:600;font-size:40px;letter-spacing:-.018em\">Canon<\u002Fspan>\n          <\u002Fdiv>\n          <span style=\"position:absolute;left:14px;top:50%;transform:translateY(-50%);font:700 13px/1 'JetBrains Mono';color:#C45A2E\">x<\u002Fspan>\n          <span style=\"position:absolute;top:13px;left:50%;transform:translateX(-50%);font:700 13px/1 'JetBrains Mono';color:#C45A2E\">x<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:20px 0 0;max-width:440px;font:400 13.5px/1.6 'Public Sans';color:#574C40\">Keep clear space equal to <b style=\"color:#2A2119\">x<\u002Fb> — the height of the mark's inner square — on all four sides. Never let type, edges, or other logos intrude.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:30px\">\n        <div style=\"font:600 11px/1 'Public Sans';letter-spacing:.16em;text-transform:uppercase;color:#8A8074\">Minimum size<\u002Fdiv>\n        <div style=\"margin-top:26px;display:flex;align-items:flex-end;gap:26px;color:#2A2119\">\n          <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:9px\">\n            <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"display:inline-flex\"><svg viewBox=\"0 0 100 100\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"6.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fspan><span style=\"font-family:Newsreader,Georgia,serif;font-weight:600;font-size:22px;letter-spacing:-.018em\">Canon<\u002Fspan><\u002Fdiv>\n            <span style=\"font:500 11px/1 'JetBrains Mono';color:#8A8074\">lockup · 96px wide<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:24px;display:flex;align-items:flex-end;gap:14px;color:#2A2119\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:8px\"><svg viewBox=\"0 0 100 100\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"8\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"6\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><span style=\"font:500 10px/1 'JetBrains Mono';color:#8A8074\">16<\u002Fspan><\u002Fdiv>\n          <p style=\"margin:0;font:400 13px/1.55 'Public Sans';color:#574C40\">The mark alone reads down to <b style=\"color:#2A2119\">16px<\u002Fb> — the favicon floor. Below the lockup minimum, switch to the mark.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 · THE MARK ============ -->\n  <section style=\"padding:58px 0;border-top:1px solid rgba(42,33,25,.12)\">\n    <div style=\"display:flex;align-items:baseline;gap:16px\">\n      <div style=\"font-family:Newsreader,Georgia,serif;font-weight:500;font-size:20px;color:#C45A2E\">02<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Newsreader,Georgia,serif;font-weight:600;font-size:33px;letter-spacing:-.015em\">The Mark<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <!-- construction -->\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:34px;display:flex;align-items:center;justify-content:center\">\n        <svg viewBox=\"0 0 100 100\" width=\"200\" height=\"200\" fill=\"none\">\n          <line x1=\"50\" y1=\"2\" x2=\"50\" y2=\"98\" stroke=\"rgba(196,90,46,.32)\" stroke-width=\"0.7\"><\u002Fline>\n          <line x1=\"2\" y1=\"50\" x2=\"98\" y2=\"50\" stroke=\"rgba(196,90,46,.32)\" stroke-width=\"0.7\"><\u002Fline>\n          <circle cx=\"50\" cy=\"50\" r=\"46\" stroke=\"rgba(42,33,25,.16)\" stroke-width=\"0.7\"><\u002Fcircle>\n          <line x1=\"50\" y1=\"50\" x2=\"89.6\" y2=\"50\" stroke=\"rgba(196,90,46,.45)\" stroke-width=\"0.7\"><\u002Fline>\n          <text x=\"62\" y=\"46\" font-family=\"JetBrains Mono, monospace\" font-size=\"5\" fill=\"#C45A2E\">r<\u002Ftext>\n          <circle cx=\"50\" cy=\"50\" r=\"40\" stroke=\"#2A2119\" stroke-width=\"3.4\"><\u002Fcircle>\n          <rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\" stroke=\"#2A2119\" stroke-width=\"3.4\"><\u002Frect>\n          <circle cx=\"50\" cy=\"50\" r=\"4.4\" fill=\"#2A2119\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <!-- meaning -->\n      <div style=\"display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font:600 11px/1 'Public Sans';letter-spacing:.16em;text-transform:uppercase;color:#C45A2E\">What it means<\u002Fdiv>\n        <p style=\"margin:16px 0 0;font:400 16px/1.7 'Public Sans';color:#574C40\">A circle inscribed with a square — the classical figure of <b style=\"color:#2A2119\">measure and proportion<\u002Fb> — centered on a single point. The ring is the canon that contains; the square is structure; the point is first principles.<\u002Fp>\n        <p style=\"margin:14px 0 0;font:400 16px/1.7 'Public Sans';color:#574C40\">It reads as an aperture, a seal, and a target at once: a system held in proportion. Built from a circle (r = 40), a square inscribed at its diagonal, and a 5.5-unit center dot — pure geometry, so it never degrades.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- favicon / app icons -->\n    <div style=\"margin-top:18px;background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:34px\ e=\"display:flex;align-items:flex-end;gap:20px\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:9px\"><div style=\"width:66px;height:66px;border-radius:15px;background:#C45A2E;color:#F8F5F0;display:flex;align-items:center;justify-content:center\"><svg viewBox=\"0 0 100 100\" width=\"38\" height=\"38\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"5.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><span style=\"font:500 10px/1 'JetBrains Mono';color:#8A8074\">clay<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:9px\"><div style=\"width:66px;height:66px;border-radius:15px;background:#2A2119;color:#F8F5F0;display:flex;align-items:center;justify-content:center\"><svg viewBox=\"0 0 100 100\" width=\"38\" height=\"38\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"5.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><span style=\"font:500 10px/1 'JetBrains Mono';color:#8A8074\">ink<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;align-items:center;gap:9px\"><div style=\"width:66px;height:66px;border-radius:15px;background:#F8F5F0;border:1px solid rgba(42,33,25,.12);color:#C45A2E;display:flex;align-items:center;justify-content:center\"><svg viewBox=\"0 0 100 100\" width=\"38\" height=\"38\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"5.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv><span style=\"font:500 10px/1 'JetBrains Mono';color:#8A8074\">paper<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 · COLOR ============ -->\n  <section style=\"padding:58px 0;border-top:1px solid rgba(42,33,25,.12)\">\n    <div style=\"display:flex;align-items:baseline;gap:16px\">\n      <div style=\"font-family:Newsreader,Georgia,serif;font-weight:500;font-size:20px;color:#C45A2E\">03<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Newsreader,Georgia,serif;font-weight:600;font-size:33px;letter-spacing:-.015em\">Color<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:14px 0 0;max-width:680px;font:400 15.5px/1.7 'Public Sans';color:#574C40\">Warm neutrals do the work; Clay is the single accent, reserved for emphasis. Ink on Paper is the default pairing everywhere.<\u002Fp>\n\n    <!-- neutrals -->\n    <div style=\"margin-top:30px;font:600 11px/1 'Public Sans';letter-spacing:.16em;text-transform:uppercase;color:#8A8074\">Neutrals<\u002Fdiv>\n    <div style=\"margin-top:16px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px\">\n      <div><div style=\"height:96px;border-radius:8px;background:#2A2119\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Ink<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#2A2119<br>Body text · mark<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#4A3F34\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Graphite<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#4A3F34<br>Headings · UI<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#8A8074\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Stone<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#8A8074<br>Captions · meta<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#E6DDD0\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Sand<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#E6DDD0<br>Borders · rules<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#F8F5F0;border:1px solid rgba(42,33,25,.12)\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Paper<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#F8F5F0<br>Backgrounds<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- accent -->\n    <div style=\"margin-top:34px;font:600 11px/1 'Public Sans';letter-spacing:.16em;text-transform:uppercase;color:#8A8074\">Accent · Clay<\u002Fdiv>\n    <div style=\"margin-top:16px;display:grid;grid-template-columns:repeat(3,1fr) 2fr;gap:14px\">\n      <div><div style=\"height:96px;border-radius:8px;background:#97411F\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Deep Clay<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#97411F<br>Accent text · hover<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#C45A2E\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Clay<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#C45A2E<br>Primary accent<\u002Fdiv><\u002Fdiv>\n      <div><div style=\"height:96px;border-radius:8px;background:#F6E7DC;border:1px solid rgba(42,33,25,.08)\"><\u002Fdiv><div style=\"margin-top:11px;font:700 13px/1 'Public Sans'\">Clay Tint<\u002Fdiv><div style=\"margin-top:5px;font:400 11px/1.5 'JetBrains Mono';color:#8A8074\">#F6E7DC<br>Fills · highlights<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:18px 20px;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font:600 11px/1 'Public Sans';letter-spacing:.14em;text-transform:uppercase;color:#8A8074\">Balance<\u002Fdiv>\n        <div style=\"margin-top:13px;display:flex;height:30px;border-radius:5px;overflow:hidden\">\n          <div style=\"width:70%;background:#F8F5F0;border:1px solid rgba(42,33,25,.12);box-sizing:border-box;display:flex;align-items:center;padding-left:10px;font:600 10px/1 'Public Sans';color:#8A8074\">Paper 70%<\u002Fdiv>\n          <div style=\"width:24%;background:#2A2119;display:flex;align-items:center;padding-left:8px;font:600 10px/1 'Public Sans';color:#F8F5F0\">Ink 24<\u002Fdiv>\n          <div style=\"width:6%;background:#C45A2E\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"margin-top:11px;font:400 12px/1.5 'Public Sans';color:#574C40\">Clay stays at roughly <b style=\"color:#C45A2E\">6%<\u002Fb> of any surface — links, the mark, active states, and rules only.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- pairings -->\n    <div style=\"margin-top:18px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n      <div style=\"background:#F8F5F0;border:1px solid rgba(42,33,25,.12);border-radius:8px;padding:20px;text-align:center\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:24px;color:#2A2119\">Canon<\u002Fspan><div style=\"margin-top:9px;font:500 10px/1.3 'JetBrains Mono';color:#8A8074\">Ink / Paper · 13:1 · AAA<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#2A2119;border-radius:8px;padding:20px;text-align:center\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:24px;color:#F8F5F0\">Canon<\u002Fspan><div style=\"margin-top:9px;font:500 10px/1.3 'JetBrains Mono';color:#a59e90\">Paper / Ink · 13:1 · AAA<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#C45A2E;border-radius:8px;padding:20px;text-align:center\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:24px;color:#F8F5F0\">Canon<\u002Fspan><div style=\"margin-top:9px;font:500 10px/1.3 'JetBrains Mono';color:#F0CDB8\">Paper / Clay · 4:1 · AA Large<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F8F5F0;border:1px solid rgba(42,33,25,.12);border-radius:8px;padding:20px;text-align:center\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:24px;color:#97411F\">Canon<\u002Fspan><div style=\"margin-top:9px;font:500 10px/1.3 'JetBrains Mono';color:#8A8074\">Deep Clay / Paper · 6.3:1 · AA<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:14px 0 0;font:400 12.5px/1.6 'Public Sans';color:#8A8074\">For accent text at body size, use <b style=\"color:#97411F\">Deep Clay<\u002Fb>. Never set long-form copy in Clay, and never place Clay type on Ink.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ============ 04 · TYPOGRAPHY ============ -->\n  <section style=\"padding:58px 0;border-top:1px solid rgba(42,33,25,.12)\">\n    <div style=\"display:flex;align-items:baseline;gap:16px\">\n      <div style=\"font-family:Newsreader,Georgia,serif;font-weight:500;font-size:20px;color:#C45A2E\">04<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Newsreader,Georgia,serif;font-weight:600;font-size:33px;letter-spacing:-.015em\">Typography<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:30px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between\">\n          <span style=\"font-family:Newsreader,Georgia,serif;font-weight:600;font-size:64px;line-height:1\">Aa<\u002Fspan>\n          <span style=\"font:600 11px/1 'Public Sans';letter-spacing:.14em;text-transform:uppercase;color:#C45A2E\">Display<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;font-family:Newsreader,Georgia,serif;font-weight:400;font-size:19px;color:#574C40\">Newsreader<\u002Fdiv>\n        <div style=\"margin-top:6px;font-family:Newsreader,Georgia,serif;font-size:15px;color:#8A8074\">Regular · Medium · Semibold · Italic<\u002Fdiv>\n        <p style=\"margin:14px 0 0;font:400 13px/1.6 'Public Sans';color:#574C40\">Titles, the wordmark, and pull-quotes. Editorial, warm, authoritative — the voice of the canon.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:30px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between\">\n          <span style=\"font-family:'Public Sans',sans-serif;font-weight:700;font-size:64px;line-height:1;letter-spacing:-.02em\">Aa<\u002Fspan>\n          <span style=\"font:600 11px/1 'Public Sans';letter-spacing:.14em;text-transform:uppercase;color:#C45A2E\">Text<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;font-family:'Public Sans',sans-serif;font-weight:500;font-size:19px;color:#574C40\">Public Sans<\u002Fdiv>\n        <div style=\"margin-top:6px;font-family:'Public Sans',sans-serif;font-size:15px;color:#8A8074\">Regular · Medium · Semibold · Bold<\u002Fdiv>\n        <p style=\"margin:14px 0 0;font:400 13px/1.6 'Public Sans';color:#574C40\">UI, docs body, module lists, and CLI help. Neutral, legible, and public-domain — fitting for an open canon.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- scale -->\n    <div style=\"margin-top:18px;background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:8px 30px\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0;border-bottom:1px solid rgba(42,33,25,.09)\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:44px;line-height:1;letter-spacing:-.02em\">Composed.<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">Newsreader 600<br>44 / 48<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0;border-bottom:1px solid rgba(42,33,25,.09)\"><span style=\"font-family:Newsreader,serif;font-weight:600;font-size:30px;line-height:1;letter-spacing:-.015em\">Section heading<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">Newsreader 600<br>30 / 36<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0;border-bottom:1px solid rgba(42,33,25,.09)\"><span style=\"font-family:'Public Sans',sans-serif;font-weight:700;font-size:17px;line-height:1\">Subhead / label<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">Public Sans 700<br>17 / 24<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0;border-bottom:1px solid rgba(42,33,25,.09)\"><span style=\"font:400 16px/1 'Public Sans';color:#574C40\">Body copy reads in Public Sans at sixteen pixels.<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">Public Sans 400<br>16 / 27<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0;border-bottom:1px solid rgba(42,33,25,.09)\"><span style=\"font:500 12.5px/1 'Public Sans';color:#8A8074\">Caption &amp; metadata<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">Public Sans 500<br>12.5 / 18<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;padding:18px 0\"><span style=\"font:400 13px/1 'JetBrains Mono';color:#97411F\">$ canon add architecture<\u002Fspan><span style=\"font:500 11px/1.5 'JetBrains Mono';color:#8A8074;text-align:right\">JetBrains Mono 400<br>13 / 20<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 05 · VOICE & TAGLINE ============ -->\n  <section style=\"padding:58px 0;border-top:1px solid rgba(42,33,25,.12)\">\n    <div style=\"display:flex;align-items:baseline;gap:16px\">\n      <div style=\"font-family:Newsreader,Georgia,serif;font-weight:500;font-size:20px;color:#C45A2E\">05<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Newsreader,Georgia,serif;font-weight:600;font-size:33px;letter-spacing:-.015em\">Voice &amp; tagline<\u002Fh2>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:28px;background:#2A2119;border-radius:10px;padding:54px;color:#F8F5F0\">\n      <div style=\"font:600 11px/1 'Public Sans';letter-spacing:.18em;text-transform:uppercase;color:#E0905F\">Primary tagline<\u002Fdiv>\n      <div style=\"margin-top:20px;font-family:Newsreader,Georgia,serif;font-weight:500;font-size:46px;line-height:1.1;letter-spacing:-.018em\">The principles your agent codes by.<\u002Fdiv>\n      <div style=\"margin-top:26px;display:flex;gap:30px;flex-wrap:wrap;font-family:Newsreader,Georgia,serif;font-style:italic;font-size:18px;color:#a59e90\">\n        <span>“Principles, composed.”<\u002Fspan>\n        <span>“One standard. Every repo.”<\u002Fspan>\n        <span>“The rules your code is built on.”<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:26px\"><div style=\"font-family:Newsreader,serif;font-weight:600;font-size:21px;color:#C45A2E\">Precise<\u002Fdiv><p style=\"margin:10px 0 0;font:400 13.5px/1.6 'Public Sans';color:#574C40\">Say the rule and the reason. No hedging, no filler — every sentence earns its place.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:26px\"><div style=\"font-family:Newsreader,serif;font-weight:600;font-size:21px;color:#C45A2E\">Quiet<\u002Fdiv><p style=\"margin:10px 0 0;font:400 13.5px/1.6 'Public Sans';color:#574C40\">Authoritative without volume. No exclamation, no hype — the calm of a reference you trust.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#FDFBF7;border:1px solid rgba(42,33,25,.1);border-radius:8px;padding:26px\"><div style=\"font-family:Newsreader,serif;font-weight:600;font-size:21px;color:#C45A2E\">Durable<\u002Fdiv><p style=\"margin:10px 0 0;font:400 13.5px/1.6 'Public Sans';color:#574C40\">Write for the long term. Principles outlive tools — avoid trends, versions, and project specifics.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 06 · USAGE ============ -->\n  <section style=\"padding:58px 0;border-top:1px solid rgba(42,33,25,.12)\">\n    <div style=\"display:flex;align-items:baseline;gap:16px\">\n      <div style=\"font-family:Newsreader,Georgia,serif;font-weight:500;font-size:20px;color:#C45A2E\">06<\u002Fdiv>\n      <h2 style=\"margin:0;font-family:Newsreader,Georgia,serif;font-weight:600;font-size:33px;letter-spacing:-.015em\">Usage — don'ts<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"margin:14px 0 0;max-width:680px;font:400 15.5px/1.7 'Public Sans';color:#574C40\">The lockup is fixed. Protect it: don't recolor, distort, rotate, decorate, re-typeset, or crowd it.<\u002Fp>\n\n    <div style=\"margin-top:28px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <div style=\"background:#F8EBE1;border:1px solid rgba(196,90,46,.18);border-radius:8px;padding:30px;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;position:relative\"><span style=\"position:absolute;top:12px;right:13px;font:700 13px/1 'JetBrains Mono';color:#C45A2E\">✕<\u002Fspan><span style=\"display:inline-flex;color:#2f7d6b\"><svg viewBox=\"0 0 100 100\" width=\"34\" height=\"34\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"5.5\"><circle cx=\"50\" cy=\"50\" r=\"40\"><\u002Fcircle><rect x=\"21.7\" y=\"21.7\" width=\"56.6\" height=\"56.6\"><\u002Frect><circle cx=\"50\" cy=\"50\" r=\"5.5\" fill=\"currentColor\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u
